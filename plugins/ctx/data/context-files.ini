# context-files.ini — authoritative inventory of AI context files across
# tool ecosystems. Sourced by:
#   - plugins/ctx/hooks/lib/scan-context-files.sh
#   - plugins/ctx/commands/ctx-discover.md (and related commands/agents)
#
# Format: INI-like. One fact per line. Repeated keys represent list entries.
#   [section]      ecosystem id (stable, lowercase, hyphenated)
#   name = ...     human-readable ecosystem name (single value)
#   root_file = ... exact-name file at repo root
#   directory = ... directory whose contents are all context
#   nested_file = ... exact-name file searched at any depth
#   file_glob = ... glob pattern for matching files (relative to repo root)
#
# Adding a new ecosystem: add a section here. No other file needs editing —
# the shell helper and the markdown prompts both read from this file.

[claude-code]
name = Claude Code
root_file = CLAUDE.md
nested_file = CLAUDE.md
directory = .claude/
config_file = .mcp.json
config_file = .vscode/mcp.json

[agents-universal]
name = Universal AGENTS.md
root_file = AGENTS.md
nested_file = AGENTS.md

[gemini]
name = Gemini
root_file = GEMINI.md
nested_file = GEMINI.md
directory = .gemini/

[codex]
name = OpenAI Codex
directory = .codex/

[cursor]
name = Cursor
root_file = .cursorrules
directory = .cursor/
file_glob = .cursor/rules/*.mdc

[windsurf]
name = Windsurf
root_file = .windsurfrules

[continue]
name = Continue
root_file = .continuerules
directory = .continue/

[jules]
name = Jules (Gemini)
root_file = GEMINI.md
nested_file = GEMINI.md
directory = .jules/

[roo-cline]
name = Roo / Cline
root_file = .clinerules
directory = .roo/
config_file = .roo/mcp.json

[crush]
name = Crush
root_file = CRUSH.md
nested_file = CRUSH.md

[aider]
name = Aider
root_file = .aider.conf.yml
root_file = .aider.model.settings.yml
root_file = ai-rules.yml
root_file = .ai-rules.yml

[serena]
name = Serena
directory = .serena/

[spec-kit]
name = spec-kit
directory = .specify/

[github]
name = GitHub agents/skills
directory = .github/agents/
directory = .github/skills/

[vscode]
name = VS Code
config_file = .vscode/settings.json
config_file = mcp.json

[planning]
name = Planning / output directories
directory = claudedocs/
directory = specs/
directory = plans/
directory = planning/
directory = info/

[ignore]
# Directories the scanner should never descend into.
name = Scanner ignore list
ignore_dir = .git
ignore_dir = node_modules
ignore_dir = .venv
ignore_dir = venv
ignore_dir = target
ignore_dir = dist
ignore_dir = build
ignore_dir = .next
ignore_dir = .cache

[heuristics]
name = Heuristic detection
# ALL_CAPS markdown files in the repo root that are NOT ai-context files.
# Anything else matching ALL_CAPS*.md at the root is a candidate.
allcaps_exclude = README
allcaps_exclude = LICENSE
allcaps_exclude = CHANGELOG
allcaps_exclude = CONTRIBUTING
allcaps_exclude = SECURITY
allcaps_exclude = CODE_OF_CONDUCT
allcaps_exclude = VENDORED
allcaps_exclude = NOTICE
allcaps_exclude = AUTHORS
allcaps_exclude = MAINTAINERS
